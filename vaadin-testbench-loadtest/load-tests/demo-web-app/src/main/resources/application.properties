server.port=${PORT:8080}
logging.level.org.atmosphere = warn
logging.level.org.hibernate = warn
logging.level.org.hibernate.SQL = warn
logging.level.com.zaxxer.hikari = warn
spring.mustache.check-template-location = false

# Launch the default browser when starting the application in development mode
vaadin.launch-browser=true
# To improve the performance during development.
# For more information https://vaadin.com/docs/latest/integrations/spring/configuration#special-configuration-parameters
vaadin.allowed-packages = com.vaadin,org.vaadin,com.flowingcode,com.vaadin.laboratory
spring.jpa.defer-datasource-initialization = true
spring.sql.init.mode = always

# Disable verbose SQL/JPA logging
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Actuator configuration for load testing metrics
management.server.port=${MANAGEMENT_PORT:8082}
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=always